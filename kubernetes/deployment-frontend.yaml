apiVersion: apps/v1
kind: Deployment
metadata:
  name: fl-frontend
  namespace: default
spec:
  replicas: 2
  selector:
    matchLabels:
      app: fl-frontend
  template:
    metadata:
      labels:
        app: fl-frontend
    spec:
      containers:
        - name: fl-frontend
          image: cross-hospital-fl/frontend:1.0.0
          ports:
            - containerPort: 80
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: fl-frontend-service
spec:
  selector:
    app: fl-frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
