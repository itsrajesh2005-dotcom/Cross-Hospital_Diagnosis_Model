version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: cross_hospital_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: cross_hospital_fl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: cross_hospital_redis
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2024-05-28T17-19-04Z
    container_name: cross_hospital_minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadminpassword
    ports:
      - "9000:9000"
      - "9001:9001"
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: cross_hospital_prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:11.0.0
    container_name: cross_hospital_grafana
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: cross_hospital_backend
    ports:
      - "8000:8000"
    environment:
      - POSTGRES_SERVER=postgres
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgrespassword
      - POSTGRES_DB=cross_hospital_fl
      - REDIS_HOST=redis
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadminpassword
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      minio:
        condition: service_started

  hospital_node_a:
    build:
      context: ../hospital_node
      dockerfile: Dockerfile
    container_name: hospital_node_stjude
    environment:
      - HOSPITAL_NAME=St. Jude Children's Research Hospital
      - HOSPITAL_CODE=HOSP_STJUDE
      - AGGREGATOR_URL=http://backend:8000/api/v1
      - DATASET_SIZE=1500
    depends_on:
      - backend

  hospital_node_b:
    build:
      context: ../hospital_node
      dockerfile: Dockerfile
    container_name: hospital_node_mayo
    environment:
      - HOSPITAL_NAME=Mayo Clinic Diagnostic Center
      - HOSPITAL_CODE=HOSP_MAYO
      - AGGREGATOR_URL=http://backend:8000/api/v1
      - DATASET_SIZE=2200
    depends_on:
      - backend

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: cross_hospital_frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
  minio_data:
